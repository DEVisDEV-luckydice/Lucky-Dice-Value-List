<!-- index.html -->

<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Lucky Dice Value List</title>

  <link
  rel="stylesheet"
  href="style.css"
>

  <link
  rel="preconnect"
  href="https://fonts.googleapis.com">

  <link
  rel="preconnect"
  href="https://fonts.gstatic.com"
  crossorigin>

  <link
  href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;700&display=swap"
  rel="stylesheet">

</head>

<body>

  <!-- NAVIGATION -->

  <div class="floatingFrame navFrame">

    <div class="navTitle">
      🎲 Lucky Dice
    </div>

    <div class="navButtons">

      <button class="activeNav">
        Home
      </button>

      <button>
        Value List
      </button>

      <button>
        Feedback
      </button>

    </div>

  </div>

  <!-- SWITCH -->

  <div class="floatingFrame switchFrame">

    <div class="switchTitle">
      📚 Switch Pages
    </div>

    <div class="switchButtons">

      <button
        class="activeSwitch"
        onclick="showPage('valuePage')"
      >

        📋 Value List

      </button>

      <button
        onclick="showPage('calculatorPage')"
      >

        🧮 Trade Calculator

      </button>

    </div>

  </div>

  <!-- MAIN -->

  <div class="floatingFrame mainFrame">

    <!-- VALUE PAGE -->

    <div id="valuePage">

      <div class="valueHeader">

        <h1>
          📋 Value List
        </h1>

        <input
          type="text"
          id="searchBar"
          placeholder="Search items..."
        >

      </div>

      <div id="itemContainer"></div>

    </div>

    <!-- CALCULATOR PAGE -->

    <div
      id="calculatorPage"
      class="hidden"
    >

      <div class="calculatorTitle">

        🧮 Trade Calculator

      </div>

      <div class="calculatorBox">

        Coming Soon...

      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
